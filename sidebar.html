<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; font-size: 13px; }

    header {
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { font-size: 14px; font-weight: 500; }

    #status {
      font-size: 11px;
      color: #E24B4A;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dot {
      width: 7px; height: 7px;
      background: #E24B4A;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #captions-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: calc(100vh - 110px);
      overflow-y: auto;
    }

    .caption-item {
      padding: 8px 10px;
      background: #f5f5f5;
      border-radius: 6px;
      border-left: 2px solid #ddd;
      line-height: 1.5;
    }
    .caption-item .time {
      font-size: 10px;
      color: #999;
      margin-bottom: 3px;
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 14px;
      border-top: 1px solid #eee;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #word-count { font-size: 11px; color: #999; text-align: center; }

    button {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
    }
    button:hover { background: #f5f5f5; }
    #clear-btn { border: none; color: #999; font-size: 11px; }
  </style>
</head>
<body>

  <header>
    <h1>Caption Capture</h1>
    <div id="status">
      <div class="dot"></div>
      <span>Recording</span>
    </div>
  </header>

  <div id="captions-list">
    <p style="color:#bbb; text-align:center; margin-top:40px">
      Captions will appear here...
    </p>
  </div>

  <footer>
    <div id="word-count">0 words captured</div>
    <button id="download-btn">⬇ Download .txt</button>
    <button id="clear-btn">Clear</button>
  </footer>

  <script src="sidebar.js"></script>
</body>
</html>
